services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      BACKEND_HOST: ${BACKEND_HOST}
      BACKEND_PORT: ${BACKEND_PORT}
      BACKEND_SECRET_KEY: ${BACKEND_SECRET_KEY}
      BACKEND_ALLOWED_ORIGINS: ${BACKEND_ALLOWED_ORIGINS}
      BACKEND_COOKIE_NAME: ${BACKEND_COOKIE_NAME}
      BACKEND_COOKIE_SECURE: ${BACKEND_COOKIE_SECURE}
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL}
      AUTH_ACCESS_TOKEN_TTL_MINUTES: ${AUTH_ACCESS_TOKEN_TTL_MINUTES}
      AUTH_REFRESH_TOKEN_TTL_DAYS: ${AUTH_REFRESH_TOKEN_TTL_DAYS}
      AUTH_EMAIL_CODE_TTL_MINUTES: ${AUTH_EMAIL_CODE_TTL_MINUTES}
      AUTH_PASSWORD_RESET_TTL_MINUTES: ${AUTH_PASSWORD_RESET_TTL_MINUTES}
      AUTH_CHALLENGE_TTL_MINUTES: ${AUTH_CHALLENGE_TTL_MINUTES}
      AUTH_REAUTH_TTL_MINUTES: ${AUTH_REAUTH_TTL_MINUTES}
      AUTH_CODE_MAX_ATTEMPTS: ${AUTH_CODE_MAX_ATTEMPTS}
      MACHINE_REGISTRATION_TTL_MINUTES: ${MACHINE_REGISTRATION_TTL_MINUTES}
      MACHINE_INVITE_TTL_HOURS: ${MACHINE_INVITE_TTL_HOURS}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY}
      API_KEY_PEPPER: ${API_KEY_PEPPER:-change_me}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      BRAND_DISPLAY_NAME: ${BRAND_DISPLAY_NAME}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_LINK_TTL_MINUTES: ${TELEGRAM_LINK_TTL_MINUTES}
      TELEGRAM_INTERNAL_SIGNING_SECRET: ${TELEGRAM_INTERNAL_SIGNING_SECRET:-}
      INTERNAL_REQUEST_TTL_SECONDS: ${INTERNAL_REQUEST_TTL_SECONDS:-300}
      TLS_CERT_PATH: ${TLS_CERT_PATH}
      TLS_KEY_PATH: ${TLS_KEY_PATH}
      TLS_CA_PATH: ${TLS_CA_PATH}
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    depends_on:
      - backend

  tg_bot:
    build:
      context: ./Tg_bot
      dockerfile: Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_INTERNAL_SIGNING_SECRET: ${TELEGRAM_INTERNAL_SIGNING_SECRET:-}
      BACKEND_BASE_URL: http://backend:8000
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      - backend
      - redis

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
