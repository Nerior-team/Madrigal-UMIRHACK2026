events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  server {
    listen 80;
    server_name nerior.store 212.8.227.40 _;

    location /.well-known/acme-challenge/ {
      alias /var/www/certbot/.well-known/acme-challenge/;
      default_type text/plain;
      try_files $uri =404;
    }

    location /downloads/ {
      alias /usr/share/nginx/html/downloads/;
      add_header Cache-Control "public, max-age=300";
      autoindex off;
      try_files $uri =404;
    }

    location / {
      return 301 https://nerior.store$request_uri;
    }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name nerior.store;

    client_max_body_size 32m;
    resolver 127.0.0.11 ipv6=off valid=30s;

    ssl_certificate /etc/letsencrypt/live/nerior.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nerior.store/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:PredictMVSSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy same-origin always;

    location /downloads/ {
      alias /usr/share/nginx/html/downloads/;
      add_header Cache-Control "public, max-age=300";
      autoindex off;
      try_files $uri =404;
    }

    location /api/v1/ws/ {
      set $backend_upstream http://backend:8000;
      proxy_pass $backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    location /api/v1/realtime/feed {
      set $backend_upstream http://backend:8000;
      proxy_pass $backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection '';
      proxy_buffering off;
      proxy_cache off;
      chunked_transfer_encoding on;
      proxy_read_timeout 3600s;
    }

    location /api/ {
      set $backend_upstream http://backend:8000;
      proxy_pass $backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://frontend:80;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
